<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Map</title>

  <style>
    html, body { 
      margin: 0; 
      font-family: Arial, sans-serif; 
      height: 100%;
      overflow-y: auto;
      background: #f8f9fa; 
    }

    #auth-screen { 
      height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .auth-box { 
      background: white; 
      padding: 40px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      width: 380px; 
      text-align: center; 
      max-width: 90%; 
    }

    input, button, select, textarea { 
      width: 100%; 
      padding: 12px; 
      margin: 8px 0; 
      border-radius: 8px; 
      border: 1px solid #ccc; 
      font-size: 15px; 
      box-sizing: border-box; 
    }

    button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #0056b3; }

    #map-screen { 
      display: none; 
      flex-direction: column; 
    }

    /* FULL SCREEN MAP */
    #top-section { 
      display: flex; 
      height: 100vh;
      min-height: 600px;
    }

    #map { 
      height: 100%; 
      width: 70%; 
    }

    #sidebar { 
      height: 100%; 
      width: 30%; 
      padding: 15px; 
      background: #f0f0f0; 
      overflow-y: auto;
      box-sizing: border-box; 
    }

    #customer-list-container { 
      background: #f0f0f0; 
      padding: 15px; 
      border-top: 3px solid #ccc; 
    }

    #customer-list { 
      max-height: 800px; 
      overflow-y: auto; 
      background: white; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
    }

    #customer-list ul { list-style: none; padding: 0; margin: 0; }
    #customer-list li { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; }
    #customer-list li:hover { background: #f0f0f0; }

    /* FIXED LEGEND */
    #pin-legend { 
      position: fixed;
      bottom: 20px; 
      left: 20px; 
      background: white; 
      padding: 12px; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
      font-size: 14px; 
      z-index: 2000; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); 
      display: none;
    }

    .legend-item { display: flex; align-items: center; margin: 6px 0; }
    .legend-color { width: 22px; height: 22px; margin-right: 8px; border: 1px solid #999; border-radius: 4px; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Sales Map</h1>
    <p>Simple field sales mapping for teams</p>

    <button onclick="showSignIn()">Sign In</button>
    <button onclick="showCreateAccount()" style="background:#28a745;">Create Free Account</button>

    <div id="signin-form" style="display:none;">
      <input id="signin-email" type="email" placeholder="Email">
      <input id="signin-password" type="password" placeholder="Password">
      <button onclick="signIn()">Sign In</button>
    </div>

    <div id="create-form" style="display:none;">
      <input id="create-email" type="email" placeholder="Email">
      <input id="create-password" type="password" placeholder="Password">
      <input id="companyName" placeholder="Company Name (required)">
      <button onclick="signUp()">Create My Account</button>
    </div>
  </div>
</div>

<!-- MAP SCREEN -->
<div id="map-screen">
  <div id="top-section">
    <div id="map"></div>

    <div id="sidebar">
      <h2 id="companyHeader">Sales Map</h2>
      <button onclick="signOut()">Sign Out</button>

      <h2>Add/Edit Customer</h2>
      <input id="name" placeholder="Customer Name" disabled>
      <input id="address" placeholder="Customer Address" disabled>
      <select id="priority" disabled>
        <option value="urgent">Hotlist (Blue)</option>
        <option value="high">High Priority (Green)</option>
        <option value="medium">Medium Priority (Yellow)</option>
        <option value="low">Low Priority (Red)</option>
        <option value="never">New Visit (Orange)</option>
        <option value="no">No Visit (Purple)</option>
        <option value="ucc">UCC (Light Blue)</option>
      </select>

      <input id="contactName" placeholder="Contact Name" disabled>
      <input id="phone" type="tel" placeholder="Phone Number" disabled>
      <input id="emailContact" type="email" placeholder="Email Address" disabled>
      <textarea id="notes" placeholder="Additional Notes" disabled></textarea>
      <input id="lastVisit" type="date" disabled>

      <button id="addCustomerButton" onclick="addCustomer()" disabled>Add Customer</button>
      <button id="saveEditButton" onclick="saveEditedCustomer()" style="display:none;" disabled>Save Changes</button>
      <button id="cancelEditButton" onclick="cancelEdit()" style="display:none;">Cancel</button>
    </div>
  </div>

  <div id="customer-list-container">
    <h3>Customer List</h3>
    <div id="customer-list">
      <ul id="customer-list-ul"></ul>
    </div>
  </div>
</div>

<div id="pin-legend">
  <h4>Pin Color Legend</h4>
  <div class="legend-item"><div class="legend-color" style="background:blue;"></div>Hotlist</div>
  <div class="legend-item"><div class="legend-color" style="background:green;"></div>High Priority</div>
  <div class="legend-item"><div class="legend-color" style="background:yellow;"></div>Medium Priority</div>
  <div class="legend-item"><div class="legend-color" style="background:red;"></div>Low Priority</div>
  <div class="legend-item"><div class="legend-color" style="background:orange;"></div>New Visit</div>
  <div class="legend-item"><div class="legend-color" style="background:purple;"></div>No Visit</div>
  <div class="legend-item"><div class="legend-color" style="background:#ADD8E6;"></div>UCC</div>
  <div class="legend-item"><div class="legend-color" style="background:pink;"></div>Overdue</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA1aUdvuhzMqJAKGNy0ttDVS-QZNib30ZY",
  authDomain: "sales-map-ac968.firebaseapp.com",
  projectId: "sales-map-ac968",
  storageBucket: "sales-map-ac968.firebasestorage.app",
  messagingSenderId: "758371444111",
  appId: "1:758371444111:web:a5f0f425522e1bf536d7fa"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let editingId = null;

function cancelEdit() {
  editingId = null;
  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("priority").value = "urgent";
  document.getElementById("contactName").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("emailContact").value = "";
  document.getElementById("notes").value = "";
  document.getElementById("lastVisit").value = "";
  document.getElementById("saveEditButton").style.display = "none";
  document.getElementById("addCustomerButton").style.display = "block";
  document.getElementById("cancelEditButton").style.display = "none";
}
    }

    function initMap(){
      map=new google.maps.Map(document.getElementById("map"),{
        zoom:7,
        center:{lat:35.7796,lng:-78.6382}
      });
    }

    window.initMap=initMap;

    window.addEventListener("load",()=>{
      const script=document.createElement("script");
      script.src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_KEY&callback=initMap";
      script.async=true;
      document.head.appendChild(script);
    });
      enableAllInputs();

      setTimeout(() => {
        const mapDiv = document.getElementById("map");
        if (!map) {
          map = new google.maps.Map(mapDiv, { zoom: 7, center: { lat: 35.7796, lng: -78.6382 } });
        }
        google.maps.event.trigger(map, 'resize');
      }, 400);

      setTimeout(() => {
        if (map) google.maps.event.trigger(map, 'resize');
      }, 900);

      setTimeout(() => {
        if (map) google.maps.event.trigger(map, 'resize');
      }, 1500);
    }

    function showAuthScreen() {
      document.getElementById("auth-screen").style.display = "flex";
      document.getElementById("map-screen").style.display = "none";
      document.getElementById("pin-legend").style.display = "none";
    }

    function enableAllInputs() {
      const inputs = document.querySelectorAll("#name, #address, #priority, #contactName, #phone, #emailContact, #notes, #lastVisit, #reminders, #addCustomerButton, #saveEditButton, #cancelEditButton, #filter, #search");
      inputs.forEach(i => i.disabled = false);
    }

    function showSignIn() {
      document.getElementById("signin-form").style.display = "block";
      document.getElementById("create-form").style.display = "none";
    }

    function showCreateAccount() {
      document.getElementById("signin-form").style.display = "none";
      document.getElementById("create-form").style.display = "block";
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentAccountId = await getOrCreateAccount(user.uid, user.email);
        if (currentAccountId) {
          loadCustomers();
          showMapScreen();
        }
      } else {
        showAuthScreen();
      }
    });

    async function getOrCreateAccount(uid, email) {
      const userRef = db.collection("users").doc(uid);
      const userDoc = await userRef.get();
      if (userDoc.exists) {
        const accId = userDoc.data().accountId;
        const accDoc = await db.collection("accounts").doc(accId).get();
        document.getElementById("companyHeader").textContent = accDoc.data().name || "Sales Map";
        return accId;
      }

      const companyName = document.getElementById("companyName").value.trim();
      if (!companyName) {
        alert("Company Name is required");
        return null;
      }

      const accountRef = db.collection("accounts").doc();
      await accountRef.set({
        ownerUid: uid,
        name: companyName,
        members: [uid],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await userRef.set({ accountId: accountRef.id });
      document.getElementById("companyHeader").textContent = companyName;
      return accountRef.id;
    }

    function signIn() {
      const email = document.getElementById("signin-email").value;
      const password = document.getElementById("signin-password").value;
      auth.signInWithEmailAndPassword(email, password).catch(err => alert("Sign-in failed: " + err.message));
    }

    function signUp() {
      const email = document.getElementById("create-email").value;
      const password = document.getElementById("create-password").value;
      if (!email || !password) return alert("Email and password required");
      auth.createUserWithEmailAndPassword(email, password)
        .catch(err => alert("Create account failed: " + err.message));
    }

    function signOut() {
      auth.signOut();
    }

    function customersRef() { return db.collection(`accounts/${currentAccountId}/customers`); }

    async function loadCustomers() {
      if (!currentAccountId) return;
      customersRef().onSnapshot(snapshot => {
        window.customers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        initMap(getSelectedFilters());
      });
    }

    function addCustomer() {
      const nameVal = document.getElementById("name").value.trim();
      const addressVal = document.getElementById("address").value.trim();
      if (!nameVal || !addressVal) return alert("Name and address required");

      geocodeAddress(addressVal, result => {
        if (result) {
          customersRef().add({
            name: nameVal,
            address: result.formattedAddress,
            lat: result.lat,
            lng: result.lng,
            priority: document.getElementById("priority").value,
            contactName: document.getElementById("contactName").value || "",
            phone: document.getElementById("phone").value || "",
            emailContact: document.getElementById("emailContact").value || "",
            notes: document.getElementById("notes").value || "",
            lastVisit: document.getElementById("lastVisit").value || "",
            reminders: Array.from(document.getElementById("reminders").selectedOptions).map(o => o.value),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          clearForm();
        }
      });
    }

    function editCustomer(id) {
      const customer = window.customers.find(c => c.id === id);
      if (!customer) return;
      document.getElementById("name").value = customer.name;
      document.getElementById("address").value = customer.address;
      document.getElementById("priority").value = customer.priority;
      document.getElementById("contactName").value = customer.contactName || "";
      document.getElementById("phone").value = customer.phone || "";
      document.getElementById("emailContact").value = customer.emailContact || "";
      document.getElementById("notes").value = customer.notes || "";
      document.getElementById("lastVisit").value = customer.lastVisit || "";
      const remSel = document.getElementById("reminders");
      Array.from(remSel.options).forEach(opt => opt.selected = (customer.reminders || []).includes(opt.value));

      editingId = id;
      document.getElementById("saveEditButton").style.display = "block";
      document.getElementById("addCustomerButton").style.display = "none";
      document.getElementById("cancelEditButton").style.display = "inline-block";
    }

    function saveEditedCustomer() {
      if (!editingId) return;
      const nameVal = document.getElementById("name").value.trim();
      const addressVal = document.getElementById("address").value.trim();
      if (!nameVal || !addressVal) return alert("Name and address required");

      geocodeAddress(addressVal, result => {
        if (result) {
          customersRef().doc(editingId).update({
            name: nameVal,
            address: result.formattedAddress,
            lat: result.lat,
            lng: result.lng,
            priority: document.getElementById("priority").value,
            contactName: document.getElementById("contactName").value || "",
            phone: document.getElementById("phone").value || "",
            emailContact: document.getElementById("emailContact").value || "",
            notes: document.getElementById("notes").value || "",
            lastVisit: document.getElementById("lastVisit").value || "",
            reminders: Array.from(document.getElementById("reminders").selectedOptions).map(o => o.value)
          });
          clearForm();
        }
      });
    }

    function deleteCustomer(id) {
      if (confirm("Delete this customer?")) customersRef().doc(id).delete();
    }

    function clearForm() {
      document.getElementById("name").value = "";
      document.getElementById("address").value = "";
      document.getElementById("priority").value = "urgent";
      document.getElementById("contactName").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("emailContact").value = "";
      document.getElementById("notes").value = "";
      document.getElementById("lastVisit").value = "";
      document.getElementById("reminders").selectedIndex = -1;
      editingId = null;
      document.getElementById("saveEditButton").style.display = "none";
      document.getElementById("addCustomerButton").style.display = "block";
      document.getElementById("cancelEditButton").style.display = "none";
    }

    function isOverdue(customer) {
      if (!customer.lastVisit || !customer.reminders || customer.reminders.includes("never")) return false;
      const last = new Date(customer.lastVisit);
      if (isNaN(last.getTime())) return false;
      return customer.reminders.some(r => {
        if (r === "never") return false;
        const months = parseInt(r);
        const due = new Date(last);
        due.setMonth(due.getMonth() + months);
        return due < today;
      });
    }

    function getSelectedFilters() {
      return Array.from(document.getElementById("filter").selectedOptions).map(o => o.value);
    }

    function applyFilter() { initMap(getSelectedFilters()); }
    function searchCustomers() { initMap(getSelectedFilters(), document.getElementById("search").value.toLowerCase()); }

    function initMap(filters = ["all"], search = "") {
      const mapDiv = document.getElementById("map");
      if (!map) {
        map = new google.maps.Map(mapDiv, { zoom: 7, center: { lat: 35.7796, lng: -78.6382 } });
      }
      markers.forEach(m => m.setMap(null));
      markers = [];

      const filtered = window.customers.filter(c => {
        const overdue = isOverdue(c);
        const matchFilter = filters.includes("all") || filters.includes(c.priority) || (filters.includes("overdue") && overdue);
        const matchSearch = !search || c.name.toLowerCase().includes(search);
        return matchFilter && matchSearch;
      });

      const ul = document.getElementById("customer-list-ul");
      ul.innerHTML = "";
      filtered.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
        const li = document.createElement("li");
        li.textContent = c.name;
        li.className = `priority-${isOverdue(c) ? "overdue" : c.priority}`;
        li.onclick = () => {
          map.setCenter({lat: c.lat, lng: c.lng});
          map.setZoom(15);
          const marker = markers.find(m => m.customerId === c.id);
          if (marker) marker.infoWindow.open(map, marker);
        };
        ul.appendChild(li);
      });

      filtered.forEach(c => {
        if (!c.lat || !c.lng) return;
        let color = isOverdue(c) ? "pink" : 
                    c.priority === "urgent" ? "blue" :
                    c.priority === "high" ? "green" :
                    c.priority === "medium" ? "yellow" :
                    c.priority === "low" ? "red" :
                    c.priority === "never" ? "orange" :
                    c.priority === "no" ? "purple" : "ltblue";

        const infoContent = `
          <h3>${c.name}</h3>
          <p>Address: ${c.address}</p>
          <p>Priority: ${c.priority}</p>
          <p>Contact: ${c.contactName || 'N/A'}</p>
          <p>Phone: ${c.phone || 'N/A'}</p>
          <p>Email: ${c.emailContact || 'N/A'}</p>
          <p>Notes: ${c.notes || 'N/A'}</p>
          <p>Last Visit: ${c.lastVisit || 'N/A'}</p>
          <button onclick="editCustomer('${c.id}')">Edit</button>
          <button onclick="deleteCustomer('${c.id}')">Delete</button>
        `;

        const infoWindow = new google.maps.InfoWindow({ content: infoContent });
        const marker = new google.maps.Marker({
          position: { lat: Number(c.lat), lng: Number(c.lng) },
          map: map,
          title: c.name,
          icon: `https://maps.google.com/mapfiles/ms/icons/${color}-dot.png`,
          customerId: c.id
        });
        marker.infoWindow = infoWindow;
        marker.addListener("click", () => {
          if (currentInfoWindow) currentInfoWindow.close();
          infoWindow.open(map, marker);
          currentInfoWindow = infoWindow;
        });
        markers.push(marker);
      });
    }

    function geocodeAddress(address, callback) {
      if (!geocoder) geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address }, (results, status) => {
        if (status === "OK") {
          callback({
            lat: results[0].geometry.location.lat(),
            lng: results[0].geometry.location.lng(),
            formattedAddress: results[0].formatted_address
          });
        } else {
          alert("Geocode failed: " + status);
          callback(null);
        }
      });
    }

    window.initMap = initMap;

    window.addEventListener('load', () => {
      const script = document.createElement('script');
      script.src = "https://maps.googleapis.com/maps/api/js?key=AIzaSyAk5eJEWBbPMOJjybLkJvQ9vJgvFw87030&callback=initMap&loading=async";
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
